<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reservation</title>

  <style>
    body {
      margin: 0;
      font-family: "Hiragino Sans", "ヒラギノ角ゴシック", -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #373f5c;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .wrapper {
      width: 100%;
      max-width: 520px;
      text-align: center;
      padding: 24px 20px 40px;
      box-sizing: border-box;
    }

    .hero {
      position: relative;
      width: 100%;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      margin-bottom: 28px;
    }

    .hero img {
      width: 100%;
      display: block;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.06em;
      margin-bottom: 26px;
      color: #e4d7c5;
    }

    .btn {
      display: block;
      width: 100%;
      max-width: 420px;
      margin: 14px auto;
      padding: 16px 18px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 999px;
      text-decoration: none;
      background: #e4d7c5;
      color: #373f5c;
      transition: all 0.2s ease;
      box-shadow: 0 6px 18px rgba(0,0,0,0.18);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(0,0,0,0.25);
    }

    .btn.secondary {
      background: transparent;
      border: 2px solid #e4d7c5;
      color: #e4d7c5;
    }

    .footer {
      margin-top: 28px;
      font-size: 12px;
      opacity: 0.6;
      letter-spacing: 0.05em;
    }

    .logo-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60%;
      max-width: 260px;
      opacity: 0.95;
    }

@media (max-width: 480px) {
      h1 {
        font-size: 20px;
      }

      .btn {
        font-size: 15px;
        padding: 15px;
      }
    }
  </style>
</head>

<body>
  <div class="wrapper">

    <div class="hero">
      <img src="fv.png" alt="Portrait Nagoya" />
          <img class="logo-overlay" src="logo.png" alt="logo" />
    </div>

    <h1>ご予約ページ</h1>

    <a class="btn" href="https://yoyaku.tabelog.com/yoyaku/net_booking_form/index?rcd=23089838&utm_source=ig&utm_medium=social&utm_content=link_in_bio" target="_blank">
      食べログで予約する
    </a>

    <a class="btn secondary" href="https://yoyaku.toreta.in/portrait/#/" target="_blank">
      トレタで予約する
    </a>

    <div class="footer">
      ONLINE RESERVATION
    </div>

  </div>
</body>
</html>
