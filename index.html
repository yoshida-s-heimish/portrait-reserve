  <style>
    /* 既存コード2: デザイン用のCSS設定 */
    :root {
      --bg-color: #373f5c;
      --accent-color: #e4d7c5;
      --accent-line: rgba(228, 215, 197, 0.2);
      --luxury-ease: cubic-bezier(0.2, 1, 0.2, 1);
    }
    html { scroll-behavior: smooth; }
    body {
      overflow-x: hidden; margin: 0; background-color: var(--bg-color); color: white;
      font-family: "Helvetica", "Hiragino Sans", "ヒラギノ角ゴシック", sans-serif; -webkit-font-smoothing: antialiased;
    }
    .fixed-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #000; }
    .fixed-background img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }
    .hero { position: relative; width: 100%; height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
    .main-logo { width: 38%; max-width: 170px; opacity: 0; transform: translateY(15px); animation: fvEntranceSimple 2.2s var(--luxury-ease) 0.5s forwards; }
    .hero-text { font-size: 10px; font-weight: 300; letter-spacing: 0.5em; color: var(--accent-color); text-transform: uppercase; margin-top: 15px; opacity: 0; transform: translateY(15px); animation: fvEntranceSimple 2.2s var(--luxury-ease) 0.5s forwards; }
    .scroll-guide { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 12px; opacity: 0; text-decoration: none; cursor: pointer; animation: fvEntrance 2.2s var(--luxury-ease) 0.5s forwards; }
    @keyframes fvEntrance { to { opacity: 1; transform: translate(-50%, 0); } }
    @keyframes fvEntranceSimple { to { opacity: 1; transform: translateY(0); } }

    /* SCROLL 7px指定 */
    .scroll-guide span { font-size: 8px; letter-spacing: 0.4em; color: var(--accent-color); font-weight: 300; text-transform: uppercase; }
    
    .scroll-line { width: 1px; height: 35px; background-color: var(--accent-line); position: relative; overflow: hidden; }
    .scroll-line::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background-color: var(--accent-color);
  transform: translateY(-100%);
  /* cubic-bezier(0.4, 0, 0.3, 1) に変更 
     - 0.4: 最初はゆったり動き出し
     - 0.3: 最後のブレーキを大幅に弱くして「スッ」と抜けるように
  */
  animation: lineFlow 2.8s infinite cubic-bezier(0.4, 0, 0.3, 1);
}
    @keyframes lineFlow { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

    .content-area { position: relative; background-color: var(--bg-color); z-index: 20; }
    .wrapper { max-width: 800px; margin: 0 auto; padding: 80px 30px; text-align: center; }
    .section-header { margin-bottom: 40px; }
    .section-en { display: block; font-size: 18px; font-weight: 300; letter-spacing: 0.25em; color: var(--accent-color); margin-bottom: 8px; text-transform: uppercase; }
    .section-ja { display: block; font-size: 9px; letter-spacing: 0.3em; color: var(--accent-color); opacity: 0.6; }
    .description { font-size: 10px; font-weight: 300; line-height: 2.2; margin-bottom: 50px; opacity: 0.9; letter-spacing: 0.08em; max-width: 440px; margin-left: auto; margin-right: auto; }
    .btn-group { display: flex; flex-direction: column; gap: 20px; align-items: center; }
    .btn { position: relative; display: block; width: 100%; max-width: 220px; padding: 15px 0; font-size: 10px; font-weight: 400; text-decoration: none; color: var(--accent-color); letter-spacing: 0.3em; text-transform: uppercase; transition: color 0.6s var(--luxury-ease), letter-spacing 0.6s var(--luxury-ease); }
    .btn::before { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 1px; background-color: rgba(228, 215, 197, 0.15); transition: transform 0.6s var(--luxury-ease); transform-origin: right; }
    .btn::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 1px; background-color: var(--accent-color); transform: scaleX(0); transition: transform 0.6s var(--luxury-ease); transform-origin: left; }
    .btn:hover { color: white; letter-spacing: 0.45em; }
    .btn:hover::before { transform: scaleX(0); }
    .btn:hover::after { transform: scaleX(1); }
    .footer { margin-top: 80px; padding: 40px 0 30px; border-top: 1px solid rgba(228, 215, 197, 0.25); font-size: 9px; font-weight: 300; line-height: 2.2; letter-spacing: 0.05em; color: var(--accent-color); }
    .copyright { margin-top: 25px; font-size: 8px; opacity: 0.6; }
    .reveal { opacity: 0; transform: translateY(15px); transition: all 1.2s var(--luxury-ease); }
    .reveal.active { opacity: 1; transform: translateY(0); }
    
    /* Google Map用のスタイル */
    .map-container {
      margin: 0 auto 20px; /* 上の余白を見出し側で制御するため0に */
      width: 100%;
      max-width: 800px;
      filter: grayscale(0.3) contrast(1.1);
    }
    .map-container iframe {
      width: 100%;
      height: 350px;
      border: 1px solid var(--accent-line);
    }
    @media (min-width: 768px) { .btn-group { flex-direction: row; justify-content: center; gap: 40px; } .wrapper { padding: 100px 40px; } }
    
  </style>

<body>
  <div class="fixed-background">
    <img src="img/FV.jpg" alt="Portrait Nagoya" />
  </div>

  <div class="hero">
    <img src="img/logo.png" alt="logo" class="main-logo" />
    <div class="hero-text">Reservation Site</div>
    <a href="#reservation-start" class="scroll-guide">
      <span>SCROLL</span>
      <div class="scroll-line"></div>
    </a>
  </div>

  <div class="content-area" id="reservation-start">
    <div class="wrapper">
      <div class="reveal section-header">
        <h1 class="section-en">Reservations</h1>
        <span class="section-ja">ご予約</span>
      </div>

      <div class="reveal">
        <div class="description">
          ご都合に合わせて予約方法をお選びいただけます。<br>
          空席確認はオンライン、細かなご相談はお電話がおすすめです。<br>
          お電話は15:00〜18:00頃が比較的繋がりやすいです。
        </div>
      </div>

      <div class="btn-group reveal" style="transition-delay: 0.2s;">
        <a class="btn"
           onclick="fbq('track','Reserve_Tabelog');"
           href="https://yoyaku.tabelog.com/yoyaku/net_booking_form/index?rcd=23089838&utm_source=ig&utm_medium=social&utm_content=link_in_bio"
           target="_blank">
          食べログで予約する
        </a>

        <a class="btn"
           onclick="fbq('track','Reserve_Toreta');"
           href="https://yoyaku.toreta.in/portrait/#/"
           target="_blank">
          トレタで予約する
        </a>

        <a class="btn"
           onclick="fbq('track','Call_Click');"
           href="tel:0522536762">
          電話で予約する
        </a>
      </div>

      <div class="reveal section-header" style="margin-top: 90px; margin-bottom: 30px;">
        <h2 class="section-en">Access</h2>
        <span class="section-ja">アクセス</span>
      </div>

　　　　<div class="reveal map-container" style="transition-delay: 0.3s;">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3261.5261901711674!2d136.8965849!3d35.168435599999995!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x600377004c3d5a03%3A0x21d2c985b79b3695!2z44Od44O844OI44Os44O844OI!5e0!3m2!1sja!2sjp!4v1777199529241!5m2!1sja!2sjp"
         width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
      <footer class="footer reveal">
        <div>愛知県名古屋市中区錦1-20-25 広小路YMDビル 1F</div>
        <div>18:00 - 00:00 | Closed on Sunday | 052-253-6762</div>
        <div class="copyright">© 2026 Portrait Nagoya</div>
      </footer>
    </div>
  </div>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>

  <script>
  // スマホのアドレスバーによるガタつき・拡大を完全に防ぐ
  const fixBgHeight = () => {
    const vh = window.innerHeight;
    document.querySelector('.fixed-background').style.height = `${vh}px`;
    document.querySelector('.hero').style.height = `${vh}px`;
  };

  // 読み込み時と画面の向きを変えた時だけ計算（スクロール中は計算させない）
  window.addEventListener('load', fixBgHeight);
  window.addEventListener('orientationchange', () => {
    setTimeout(fixBgHeight, 100);
  });
</script>
</body>
