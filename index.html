<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="format-detection" content="telephone=no" />
  <title>Portrait Nagoya Reservation</title>

  <style>
    body {
      overflow-x: hidden;
      margin: 0;
      font-family: "Hiragino Sans", "ヒラギノ角ゴシック", -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #373f5c;
      color: white;
    }

    /* コンテンツ幅 */
    .wrapper {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      text-align: center;
      padding: 32px 20px 48px;
      box-sizing: border-box;
    }

    /* FVを画面横100%にする（PCでもスマホでも） */
    .hero {
      position: relative;
      width: 100vw;
      margin-left: calc(50% - 50vw);
      overflow: hidden;
      margin-bottom: 20px;
    }

    .hero img {
      width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
      object-fit: cover;
    }

    /* ロゴ中央配置 */
    .logo-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60%;
      max-width: 260px;
      opacity: 0.95;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.06em;
      margin-bottom: 30px;
      color: #e4d7c5;
    }

    /* 説明文 */
    .description {
      font-size: 11px;
      line-height: 2.1;
      margin-bottom: 34px;
      opacity: 0.85;
    }

    /* ボタン */
    .btn {
      display: block;
      width: 100%;
      max-width: 420px;
      margin: 20px auto;
      padding: 17px 18px;
      font-size: 12px;
      font-weight: 600;
      border-radius: 999px;
      text-decoration: none;
      background: #e4d7c5;
      color: #373f5c;
      transition: all 0.2s ease;
      box-shadow: 0 6px 18px rgba(0,0,0,0.18);
      letter-spacing: 0.06em;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(0,0,0,0.25);
    }

    .btn.secondary {
      background: #e4d7c5;
      border: none;
      color: #373f5c;
    }

  .footer {
      text-align: left;
      margin-top: 36px;
      padding-top: 24px;
      border-top: 1px solid rgba(228,215,197,0.25);
      font-size: 12px;
      line-height: 1.9;
      letter-spacing: 0.04em;
      color: #e4d7c5;
      opacity: 0.85;
    }

    .footer .store-name {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .footer .label {
      display: inline-block;
      width: 72px;
    }

    .footer .copyright {
      margin-top: 14px;
      font-size: 11px;
      opacity: 0.55;
      letter-spacing: 0.06em;
    }
      display: inline-block;
      width: 72px;
      opacity: 0.7;
    }

    .footer {
      margin-top: 50px;
      font-size: 12px;
      opacity: 0.6;
      letter-spacing: 0.05em;
    }

    /* スマホ微調整 */
    @media (max-width: 480px) {
      .wrapper {
        padding-left: 24px;
        padding-right: 24px;
      }

      .btn {
        width: 70%;
        max-width: 70%;
        margin-left: auto;
        margin-right: auto;
        font-size: 12px;
        padding: 16px;
      }

      h1 {
        font-size: 20px;
      }

      .description {
        font-size: 11px;
      }
    }

    /* PCだけ横並び */
@media (min-width: 768px) {

  .btn-group {
    display: flex;
    justify-content: center;
    gap: 16px;          /* ボタンの間隔 */
    flex-wrap: nowrap;  /* 1列固定 */
  }

  .btn {
    width: auto;
    max-width: 240px;   /* ボタン幅 */
    margin: 14px 0;
    flex: 1;
  }

}
    /* PCだけ横幅を広げる */
@media (min-width: 768px) {

  .wrapper {
    max-width: 900px;   /* ←ここを広げる */
    padding-left: 40px; /* ←左右の余白 */
    padding-right: 40px;
  }

}
  </style>
