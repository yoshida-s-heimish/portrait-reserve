<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reservation</title>

  <style>
    body {
      margin: 0;
      font-family: "Hiragino Sans", "ヒラギノ角ゴシック", -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #373f5c;
      color: white;
    }

    /* コンテンツ幅 */
    .wrapper {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      text-align: center;
      padding: 32px 20px 48px;
      box-sizing: border-box;
    }

    /* FVを画面横100%にする（PCでもスマホでも） */
    .hero {
      position: relative;
      width: 100vw;
      margin-left: calc(50% - 50vw);
      overflow: hidden;
      margin-bottom: 32px;
    }

    .hero img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ロゴ中央配置 */
    .logo-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60%;
      max-width: 260px;
      opacity: 0.95;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.06em;
      margin-bottom: 24px;
      color: #e4d7c5;
    }

    /* 説明文 */
    .description {
      font-size: 14px;
      line-height: 2.1;
      margin-bottom: 34px;
      opacity: 0.85;
    }

    /* ボタン */
    .btn {
      display: block;
      width: 100%;
      max-width: 420px;
      margin: 14px auto;
      padding: 17px 18px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 999px;
      text-decoration: none;
      background: #e4d7c5;
      color: #373f5c;
      transition: all 0.2s ease;
      box-shadow: 0 6px 18px rgba(0,0,0,0.18);
      letter-spacing: 0.06em;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(0,0,0,0.25);
    }

    .btn.secondary {
      background: transparent;
      border: 2px solid #e4d7c5;
      color: #e4d7c5;
    }

    .footer {
      margin-top: 36px;
      padding-top: 24px;
      border-top: 1px solid rgba(228,215,197,0.25);
      font-size: 13px;
      line-height: 1.9;
      letter-spacing: 0.04em;
      color: #e4d7c5;
      opacity: 0.85;
    }

    .footer .store-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .footer .label {
      display: inline-block;
      width: 72px;
      opacity: 0.7;
    }

    .footer .copyright {
      margin-top: 14px;
      font-size: 11px;
      opacity: 0.55;
      letter-spacing: 0.06em;
    }
      display: inline-block;
      width: 72px;
      opacity: 0.7;
    }

    .footer {
      margin-top: 32px;
      font-size: 12px;
      opacity: 0.6;
      letter-spacing: 0.05em;
    }

    /* スマホ微調整 */
    @media (max-width: 480px) {
      h1 {
        font-size: 20px;
      }

      .description {
        font-size: 13px;
      }

      .btn {
        font-size: 15px;
        padding: 16px;
      }
    }
  </style>
</head>

<body>

  <!-- FV（フル幅） -->
  <div class="hero">
    <img src="FV.jpg" alt="Portrait Nagoya" />
    <img class="logo-overlay" src="logo.png" alt="logo" />
  </div>

  <div class="wrapper">

    <h1>ご予約ページ</h1>

    <div class="description">
      ご都合に合わせて予約方法をお選びいただけます。<br>
      空席確認はオンライン、細かなご相談はお電話がおすすめです。<br>
      お電話は15：00〜18：00頃が比較的繋がりやすいです。
    </div>

    <a class="btn"
      href="https://yoyaku.tabelog.com/yoyaku/net_booking_form/index?rcd=23089838&utm_source=ig&utm_medium=social&utm_content=link_in_bio"
      target="_blank">
      食べログで予約する
    </a>

    <a class="btn secondary"
      href="https://yoyaku.toreta.in/portrait/#/"
      target="_blank">
      トレタで予約する
    </a>

    <a class="btn secondary"
      href="tel:0522536762">
      電話で予約する（052-253-6762）
    </a>

    <div class="footer">
      <div class="store-name">Portrait Nagoya
      <div class="copyright">© 2026 Portrait Nagoya</div>
    </div>
      <div>愛知県名古屋市中区錦1-20-25 広小路YMDビル 1F</div>
      <div><span class="label">営業時間</span>18:00 - 00:00</div>
      <div><span class="label">定休日</span>日曜（日曜日以外の祝日は営業します。）</div>
    </div>

  </div>

</body>
</html>
