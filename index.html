    :root {

    html { scroll-behavior: smooth; }
    body {

    /* ロゴとテキストをまとめるセット */
.logo-set {
  width: 40%; 
  max-width: 180px; 
  display: flex;
  flex-direction: column;
  align-items: center;
  opacity: 0;
  transform: translateY(15px);
  animation: fvEntranceSimple 2.2s var(--luxury-ease) 0.5s forwards;
}

.main-logo {
  width: 38%;
  min-width: 170px;
  max-width: 170px;
  height: auto; /* SVGの比率を保つために追加 */
  opacity: 0;
  transform: translateY(15px);
  animation: fvEntranceSimple 2.2s var(--luxury-ease) 0.5s forwards;
}

/* SVG内のロゴの色をベージュに指定 */
.main-logo path {
  fill: var(--accent-color);
}
    .hero-text { font-size: 10px; font-weight: 300; letter-spacing: 0.5em; color: var(--accent-color); text-transform: uppercase; margin-top: 15px; opacity: 0; transform: translateY(15px); animation: fvEntranceSimple 2.2s var(--luxury-ease) 0.5s forwards; }
    .scroll-guide { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 12px; opacity: 0; text-decoration: none; cursor: pointer; animation: fvEntrance 2.2s var(--luxury-ease) 0.5s forwards; }
    @keyframes fvEntrance { to { opacity: 1; transform: translate(-50%, 0); } }
    @keyframes fvEntranceSimple { to { opacity: 1; transform: translateY(0); } }

    /* SCROLL 7px指定 */
    .scroll-guide span { font-size: 8px; letter-spacing: 0.4em; color: var(--accent-color); font-weight: 300; text-transform: uppercase; }
    
    .scroll-line { width: 1px; height: 35px; background-color: var(--accent-line); position: relative; overflow: hidden; }
    .scroll-line::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background-color: var(--accent-color);
  transform: translateY(-100%);
  /* cubic-bezier(0.4, 0, 0.3, 1) に変更 
     - 0.4: 最初はゆったり動き出し
     - 0.3: 最後のブレーキを大幅に弱くして「スッ」と抜けるように
  */
  animation: lineFlow 2.8s infinite cubic-bezier(0.4, 0, 0.3, 1);
}
    @keyframes lineFlow { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

    .content-area { position: relative; background-color: var(--bg-color); z-index: 20; }
    .wrapper { max-width: 800px; margin: 0 auto; padding: 80px 30px; text-align: center; }
    .section-header { margin-bottom: 40px; }
    .section-en { display: block; font-size: 18px; font-weight: 300; letter-spacing: 0.25em; color: var(--accent-color); margin-bottom: 8px; text-transform: uppercase; }
    .section-ja { display: block; font-size: 9px; letter-spacing: 0.3em; color: var(--accent-color); opacity: 0.6; }
    .description { font-size: 10px; font-weight: 300; line-height: 2.2; margin-bottom: 50px; opacity: 0.9; letter-spacing: 0.08em; max-width: 440px; margin-left: auto; margin-right: auto; }
    .btn-group { display: flex; flex-direction: column; gap: 20px; align-items: center; }
    .btn { position: relative; display: block; width: 100%; max-width: 220px; padding: 15px 0; font-size: 10px; font-weight: 400; text-decoration: none; color: var(--accent-color); letter-spacing: 0.3em; text-transform: uppercase; transition: color 0.6s var(--luxury-ease), letter-spacing 0.6s var(--luxury-ease); }
    .btn::before { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 1px; background-color: rgba(228, 215, 197, 0.15); transition: transform 0.6s var(--luxury-ease); transform-origin: right; }
    .btn::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 1px; background-color: var(--accent-color); transform: scaleX(0); transition: transform 0.6s var(--luxury-ease); transform-origin: left; }
    .btn:hover { color: white; letter-spacing: 0.45em; }
    .btn:hover::before { transform: scaleX(0); }
    .btn:hover::after { transform: scaleX(1); }
    .footer { margin-top: 80px; padding: 40px 0 30px; border-top: 1px solid rgba(228, 215, 197, 0.25); font-size: 9px; font-weight: 300; line-height: 2.2; letter-spacing: 0.05em; color: var(--accent-color); }
    .copyright { margin-top: 25px; font-size: 8px; opacity: 0.6; }
    .reveal { opacity: 0; transform: translateY(15px); transition: all 1.2s var(--luxury-ease); }
    .reveal.active { opacity: 1; transform: translateY(0); }
    
    /* Google Map用のスタイル */
    .map-container {
      margin: 0 auto 20px; /* 上の余白を見出し側で制御するため0に */

    .map-container iframe {

    }
    @media (min-width: 768px) { .btn-group { flex-direction: row; justify-content: center; gap: 40px; } .wrapper { padding: 100px 40px; } }

  <script>

  const fixBgHeight = () => {

    document.querySelector('.fixed-background').style.height = `${vh}px`;

  // 読み込み時と画面の向きを変えた時だけ計算（スクロール中は計算させない）
